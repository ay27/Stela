services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stela_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    ports:
      - "3306:3306"
    volumes:
      - ./seed/mysql:/docker-entrypoint-initdb.d:ro

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stela_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro

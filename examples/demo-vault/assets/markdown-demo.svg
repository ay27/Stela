<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" role="img" aria-labelledby="title desc">
  <title id="title">Stela Markdown Demo</title>
  <desc id="desc">A simple local SVG used to demonstrate Markdown image rendering.</desc>
  <rect width="640" height="240" rx="24" fill="#f8fafc"/>
  <rect x="32" y="32" width="576" height="176" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="64" y="88" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#0f172a">Run SQL in Markdown.</text>
  <text x="64" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#334155">```runsql</text>
  <text x="64" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#334155">SELECT status, COUNT(*) FROM demo_tasks;</text>
  <text x="64" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#334155">```</text>
</svg>
